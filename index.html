<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="x-ogp-key" content="955b3319-da54-4f51-b86f-4727ab509997" id="ogp-key-meta" />
<title>NEON FLIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
  body { margin:0; padding:0; background:#000; overflow:hidden; font-family: 'Courier New', monospace; }
  #game { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  canvas { image-rendering: pixelated; touch-action: none; }
</style>
</head>
<body>
<div id="game"></div>

<script>
// ────────────────────────────────────────────────
const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  parent: 'game',
  backgroundColor: '#0a001f',
  physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
  scene: { preload, create, update }
};

let game;
let player;
let gravityDir = 1;
let score = 0;
let highScore = localStorage.getItem('neonflip_hs') || 0;
let combo = 0;
let comboTimer = 0;
let speed = 4;
let orbs = [];
let obstacles = [];
let particles;
let scoreText, comboText, highText;
let gameOverFlag = false;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function preload() {}

function create() {
  const bg = this.add.graphics();
  bg.fillStyle(0x1a0033, 1); bg.fillRect(0,0,800,600);
  for (let i = 0; i < 20; i++) {
    bg.lineStyle(2, 0x00ffff, 0.12);
    bg.lineBetween(i*50,0,i*50,600);
    bg.lineBetween(0,i*50,800,i*50);
  }

  player = this.add.rectangle(180, 300, 52, 52, 0x00ffea);
  player.setStrokeStyle(7, 0xff00ff);
  this.physics.add.existing(player);
  player.body.setCollideWorldBounds(true);
  player.body.setBounce(0.5);

  particles = this.add.particles(0,0,null,{
    speed: 140, scale: { start: 0.9, end: 0 }, lifespan: 450, blendMode: 'ADD'
  });

  scoreText = this.add.text(24, 18, '00000', {fontSize:'38px', color:'#00ffea', fontFamily:'Courier New'}).setShadow(0,0,'#ff00ff',9);
  highText  = this.add.text(24, 68, `HI ${String(highScore).padStart(5,'0')}`, {fontSize:'20px', color:'#ff66cc'});
  comboText = this.add.text(400, 90, '', {fontSize:'72px', color:'#ffff00', fontFamily:'Courier New'}).setOrigin(0.5).setAlpha(0);

  this.input.on('pointerdown', flipGravity, this);
  this.input.keyboard.on('keydown-SPACE', flipGravity, this);
  this.input.keyboard.on('keydown-ENTER', flipGravity, this);

  for (let i = 0; i < 7; i++) spawnOrb(this);
  for (let i = 0; i < 3; i++) spawnObstacle(this);
}

function update(time, delta) {
  if (gameOverFlag) return;

  speed = 4 + Math.floor(score / 900);
  player.x += speed * 1.25;
  player.body.velocity.y = 420 * gravityDir;

  if (player.x > 760) player.x = 760;
  if (player.x < 100) player.x = 100;

  // SPAWN (fixed)
  if (Math.random() < 0.035 + speed/350) spawnOrb(this);
  if (Math.random() < 0.018 + speed/600) spawnObstacle(this);

  orbs.forEach((o,i) => {
    o.x -= speed;
    if (o.x < -60) { o.destroy(); orbs.splice(i,1); return; }
    if (Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), o.getBounds())) {
      collect(o, this);   // ← fixed
    }
  });

  obstacles.forEach((o,i) => {
    o.x -= speed * 1.12;
    if (o.x < -120) { o.destroy(); obstacles.splice(i,1); return; }
    if (Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), o.getBounds())) {
      gameOver(this);     // ← fixed
    }
  });

  if (combo > 0) {
    comboTimer -= delta;
    if (comboTimer <= 0) combo = 0;
  }
  comboText.setAlpha(Math.max(0, comboTimer/1000));

  score += 0.28;
  scoreText.setText(Math.floor(score).toString().padStart(5,'0'));
  
  particles.emitParticleAt(player.x-38, player.y + gravityDir*24, 1);
}

function flipGravity() {
  if (gameOverFlag) return;
  gravityDir *= -1;
  playFlip();
  this.cameras.main.flash(90, 180, 255, 255, false);
}

function spawnOrb(scene) {
  const y = 70 + Math.random()*460;
  const orb = scene.add.circle(880 + Math.random()*220, y, 20, 0xffff00);
  orb.setStrokeStyle(5, 0x00ffff);
  scene.physics.add.existing(orb, true);
  orbs.push(orb);
}

function spawnObstacle(scene) {
  const top = Math.random() < 0.5;
  const obs = scene.add.rectangle(880 + Math.random()*280, top?50:550, 100, 32, 0xff0066);
  obs.setStrokeStyle(7, 0xffff00);
  scene.physics.add.existing(obs, true);
  obstacles.push(obs);
}

function collect(orb, scene) {
  const pts = 60 + combo*15;
  score += pts;
  combo++;
  comboTimer = 1400;
  comboText.setText('×'+combo).setAlpha(1);

  for (let i = 0; i < 22; i++) particles.emitParticleAt(orb.x, orb.y);

  playPop(orb.radius||20);
  orb.destroy();
  orbs = orbs.filter(o=>o!==orb);

  if (combo > 5) scene.cameras.main.shake(140, 0.007);
}

function gameOver(scene) {
  gameOverFlag = true;
  playCrash();

  for (let i = 0; i < 80; i++) particles.emitParticleAt(player.x, player.y);
  scene.cameras.main.shake(800, 0.014);

  if (score > highScore) {
    highScore = Math.floor(score);
    localStorage.setItem('neonflip_hs', highScore);
  }

  scene.add.text(400, 240, 'GAME OVER', {fontSize:'80px', color:'#ff0066', fontFamily:'Courier New'}).setOrigin(0.5).setShadow(0,0,'#ffff00',18);
  scene.add.text(400, 340, `SCORE ${Math.floor(score)}`, {fontSize:'36px', color:'#00ffea'}).setOrigin(0.5);
  scene.add.text(400, 420, 'TAP / SPACE / ENTER → RESTART', {fontSize:'24px', color:'#cccccc'}).setOrigin(0.5);

  scene.input.once('pointerdown', ()=>location.reload());
  scene.input.keyboard.once('keydown-SPACE', ()=>location.reload());
  scene.input.keyboard.once('keydown-ENTER', ()=>location.reload());
}

// ────── SOUNDS ──────
function playFlip() {
  const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(1100, audioCtx.currentTime);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.28, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.16);
  osc.connect(g).connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.18);
}
function playPop(size) {
  const osc = audioCtx.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(700 + size*15, audioCtx.currentTime);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.55, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.28);
  osc.connect(g).connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.32);
}
function playCrash() {
  const src = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.9, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0; i<buf.length; i++) data[i] = Math.random()*2-1;
  src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.75, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+1);
  src.connect(g).connect(audioCtx.destination); src.start();
}

// Start
window.onload = () => { game = new Phaser.Game(config); };
</script>
</body>
</html>
